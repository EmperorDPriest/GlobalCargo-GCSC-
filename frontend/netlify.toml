# Netlify configuration — Global Cargo Shipping Company Frontend
# Publish root is the frontend/ directory itself

[build]
  publish = "."

# ── Clean URL rewrites ────────────────────────────────────────────────────────
# Allow ?track= query strings to load the home page cleanly
[[redirects]]
  from  = "/track"
  to    = "/index.html"
  status = 200

# Admin portal shortcut
[[redirects]]
  from   = "/admin"
  to     = "/admin/login.html"
  status = 301

# Catch-all: any unknown path → 404 handled gracefully
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
